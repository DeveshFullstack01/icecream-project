{% extends 'base.html' %}

{% block title %}
Home
{% endblock title %}

{% block body %}
<div class="container-fluid p-0">
    <div id="carouselExampleCaptions" class="carousel slide" data-bs-ride="carousel">

        <!-- Indicators -->
        <div class="carousel-indicators">
            <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="0" class="active" aria-current="true"></button>
            <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="1"></button>
            <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="2"></button>
        </div>

        <!-- Carousel Items -->
        <div class="carousel-inner">

            <!-- Slide 1 -->
            <div class="carousel-item active">
                <img src="https://images.unsplash.com/photo-1497034825429-c343d7c6a68f?w=1920&auto=format&fit=crop&q=80"
                     class="d-block w-100"
                     style="height:100vh; object-fit:cover;"
                     alt="Ice Cream">

                <div class="carousel-caption d-none d-md-block">
                    <h1>Chocolate Delight</h1>
                    <p>Rich, creamy and irresistible.</p>
                </div>
            </div>

            <!-- Slide 2 -->
            <div class="carousel-item">
                <img src="https://images.unsplash.com/photo-1488900128323-21503983a07e?w=1920&auto=format&fit=crop&q=80"
                     class="d-block w-100"
                     style="height:100vh; object-fit:cover;"
                     alt="Triple Scoop">

                <div class="carousel-caption d-none d-md-block">
                    <h1>Fresh Strawberry</h1>
                    <p>Made with real strawberries.</p>
                </div>
            </div>

            <!-- Slide 3 -->
            <div class="carousel-item">
                <img src="https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=1920&auto=format&fit=crop&q=80"
                     class="d-block w-100"
                     style="height:100vh; object-fit:cover;"
                     alt="Chocolate Ice Cream">

                <div class="carousel-caption d-none d-md-block">
                    <h1>Chocolate Special</h1>
                    <p>Your favorite dessert is waiting.</p>
                </div>
            </div>

        </div>

        <!-- Previous Button -->
        <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="prev">
            <span class="carousel-control-prev-icon"></span>
            <span class="visually-hidden">Previous</span>
        </button>

        <!-- Next Button -->
        <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next">
            <span class="carousel-control-next-icon"></span>
            <span class="visually-hidden">Next</span>
        </button>

    </div>
</div>

{% endblock body %}
